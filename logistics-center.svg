  <g id="network-points">
    <circle cx="400" cy="400" r="6" fill="#22d3ee" stroke="rgba(34,211,238,0.3)" stroke-width="2"/>
    <circle cx="600" cy="450" r="6" fill="#22d3ee" stroke="rgba(34,211,238,0.3)" stroke-width="2"/>
