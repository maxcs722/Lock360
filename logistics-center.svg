  <g id="status-indicators">
    <circle cx="1100" cy="250" r="14" fill="#22d3ee" stroke="rgba(34,211,238,0.4)" stroke-width="2"/>
    <circle cx="1100" cy="250" r="9" fill="#10b981"/>
