<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Centro logístico monitoreado con sistemas de seguridad">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172e"/>
      <stop offset="100%" stop-color="#1a2f5a"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3e5f"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="cameraGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <g id="building">
    <rect x="100" y="200" width="1000" height="500" rx="20" fill="url(#buildingGrad)" stroke="rgba(56,189,248,0.2)" stroke-width="3"/>
    <rect x="150" y="250" width="900" height="150" fill="rgba(255,255,255,0.04)" stroke="rgba(56,189,248,0.1)" stroke-width="2"/>
    <rect x="150" y="420" width="900" height="260" fill="rgba(255,255,255,0.02)" stroke="rgba(56,189,248,0.08)" stroke-width="2"/>

    <text x="600" y="340" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#38bdf8" text-anchor="middle">CENTRO LOGÍSTICO</text>
    <text x="600" y="375" font-family="Inter, Arial, sans-serif" font-size="20" fill="#acb8d6" text-anchor="middle">Almacén monitoreado 24/7</text>
  </g>

  <g id="cameras">
    <circle cx="150" cy="180" r="18" fill="url(#cameraGrad)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="150" cy="180" r="12" fill="rgba(0,0,0,0.3)"/>
    <circle cx="150" cy="180" r="8" fill="#0ea5e9"/>
    <line x1="150" y1="195" x2="150" y2="210" stroke="rgba(56,189,248,0.6)" stroke-width="3"/>

    <circle cx="1050" cy="185" r="18" fill="url(#cameraGrad)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="1050" cy="185" r="12" fill="rgba(0,0,0,0.3)"/>
    <circle cx="1050" cy="185" r="8" fill="#0ea5e9"/>
    <line x1="1050" y1="200" x2="1050" y2="215" stroke="rgba(56,189,248,0.6)" stroke-width="3"/>

    <circle cx="300" cy="150" r="16" fill="url(#cameraGrad)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="300" cy="150" r="10" fill="rgba(0,0,0,0.3)"/>
    <circle cx="300" cy="150" r="6" fill="#0ea5e9"/>

    <circle cx="900" cy="155" r="16" fill="url(#cameraGrad)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="900" cy="155" r="10" fill="rgba(0,0,0,0.3)"/>
    <circle cx="900" cy="155" r="6" fill="#0ea5e9"/>
  </g>

  <g id="access-points">
    <rect x="200" y="650" width="60" height="80" rx="8" fill="rgba(56,189,248,0.2)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="230" cy="675" r="8" fill="#38bdf8"/>
    <text x="230" y="710" font-family="Inter, Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">ACCESO</text>

    <rect x="900" y="650" width="60" height="80" rx="8" fill="rgba(56,189,248,0.2)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
    <circle cx="930" cy="675" r="8" fill="#38bdf8"/>
    <text x="930" y="710" font-family="Inter, Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">ACCESO</text>
