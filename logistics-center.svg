    <line x1="150" y1="180" x2="400" y2="400" stroke="rgba(56,189,248,0.2)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="1050" y1="185" x2="800" y2="400" stroke="rgba(56,189,248,0.2)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="300" y1="150" x2="400" y2="400" stroke="rgba(56,189,248,0.2)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="900" y1="155" x2="800" y2="400" stroke="rgba(56,189,248,0.2)" stroke-width="2" stroke-dasharray="5,5"/>
